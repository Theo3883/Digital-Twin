; PlatformIO configuration for DigitalTwin ESP32 ECG/SpO2 device
;
; Hardware:
;   - ESP32 DevKit (WROOM-32 or WROVER)
;   - AD8232 ECG module  → Analog Pin 34
;   - MAX30102 SpO2/HR   → I2C (SDA=21, SCL=22)

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

lib_deps =
    ; MAX30102 driver
    sparkfun/SparkFun MAX3010x Pulse and Proximity Sensor Library @ ^1.1.2
    ; WebSocket server for streaming to MAUI client
    links2004/WebSockets @ ^2.4.1
    ; JSON serialisation
    bblanchon/ArduinoJson @ ^7.0.4

monitor_speed = 115200
upload_speed  = 921600

build_flags =
    -DCORE_DEBUG_LEVEL=1
